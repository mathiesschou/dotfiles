[settings]
animate = true
animation_duration = 0.2
animation_fps = 120.0
focus_follows_mouse = false
mouse_follows_focus = false
hot_reload = true

[settings.layout]
mode = "scrolling"

[settings.layout.gaps.outer]
top = 8
left = 8
bottom = 8
right = 8

[settings.layout.gaps.inner]
horizontal = 6
vertical = 6

[settings.layout.scrolling]
column_width_ratio = 0.5
min_column_width_ratio = 0.2
max_column_width_ratio = 0.9
alignment = "center"
focus_navigation_style = "niri"

[settings.layout.scrolling.gestures]
enabled = true
invert_horizontal = false
fingers = 3
propagate_to_workspace_swipe = true

[settings.gestures]
enabled = true
fingers = 4
skip_empty = true
haptics_enabled = true

[settings.ui.menu_bar]
enabled = true
show_empty = true
mode = "all"
display_style = "layout"

[modifier_combinations]
mod2 = "Alt + Shift"

[virtual_workspaces]
enabled = true
default_workspace_count = 3
workspace_names = ["main", "code", "web"]
default_workspace = 0
preserve_focus_per_workspace = true
workspace_auto_back_and_forth = true

[keys]
# Aktivér/deaktivér Rift på current space
"Alt + Z"          = "toggle_space_activated"

# Apps
"Alt + Return"     = { exec = "ghostty" }
"Alt + B"          = { exec = ["open", "-a", "Zen"] }

# Focus — H/L = kolonner, N/P = op/ned i kolonne
"Alt + H"          = { move_focus = "left" }
"Alt + L"          = { move_focus = "right" }
"Alt + N"          = { move_focus = "down" }
"Alt + P"          = { move_focus = "up" }

# Flyt kolonner
"mod2 + H"         = { move_node = "left" }
"mod2 + L"         = { move_node = "right" }

# Workspaces — J/K (som Niri)
"Alt + J"          = "next_workspace"
"Alt + K"          = "prev_workspace"
"Alt + Tab"        = "switch_to_last_workspace"

# Workspaces — direkte hop
"Alt + 1"          = { switch_to_workspace = 0 }
"Alt + 2"          = { switch_to_workspace = 1 }
"Alt + 3"          = { switch_to_workspace = 2 }
# Flyt vindue til workspace
"mod2 + 1"         = { move_window_to_workspace = 0 }
"mod2 + 2"         = { move_window_to_workspace = 1 }
"mod2 + 3"         = { move_window_to_workspace = 2 }

# Layout
"Alt + F"          = "toggle_fullscreen_within_gaps"
"mod2 + F"         = "toggle_fullscreen"
"Alt + Space"      = "toggle_window_floating"
"Alt + T"          = "toggle_stack"
"Alt + C"          = "center_selection"

# Resize
"Alt + Shift + Minus" = "resize_window_shrink"
"Alt + Shift + Equal" = "resize_window_grow"

# Monitors
"Alt + Ctrl + H"   = { focus_display = "left" }
"Alt + Ctrl + L"   = { focus_display = "right" }
