# Start AeroSpace at login
start-at-login = true

# Normalizations
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

# Mouse follows focus
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']

after-startup-command = [
    'exec-and-forget borders active_color=0xffff0000 inactive_color=0xff494d64 width=10.0',
    'exec-and-forget /opt/homebrew/bin/sketchybar'
]

exec-on-workspace-change = ['/bin/bash', '-c', 
  'sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=$AEROSPACE_FOCUSED_WORKSPACE'
]


# Gaps
[gaps]
inner.horizontal = 15
inner.vertical = 15
outer.left = 15
outer.bottom = 15
# Per-monitor top gap: larger on Studio Display for SketchyBar, smaller on laptop
outer.top = [
  { monitor."Studio Display" = 50 },
  { monitor.main = 15 },
  15  # fallback for other monitors
]
outer.right = 15

# Main keybindings (Option as primary modifier)
[mode.main.binding]

# Option + arrow keys for focus
alt-left = 'focus left'
alt-down = 'focus down'
alt-up = 'focus up'
alt-right = 'focus right'

# Option + Shift + arrow keys for moving windows
alt-shift-left = 'move left'
alt-shift-down = 'move down'
alt-shift-up = 'move up'
alt-shift-right = 'move right'

# Workspaces (Option + number)
alt-1 = 'workspace 1'
alt-2 = 'workspace 2'
alt-3 = 'workspace 3'
alt-4 = 'workspace 4'
alt-5 = 'workspace 5'

# Move window to workspace (Option + Shift + number)
alt-shift-1 = 'move-node-to-workspace 1'
alt-shift-2 = 'move-node-to-workspace 2'
alt-shift-3 = 'move-node-to-workspace 3'
alt-shift-4 = 'move-node-to-workspace 4'
alt-shift-5 = 'move-node-to-workspace 5'

# Layout
alt-f = 'fullscreen'
alt-s = 'layout tiles horizontal vertical'
alt-a = 'layout accordion horizontal vertical'

# Resize mode (Option + r)
alt-r = 'mode resize'

[mode.resize.binding]
left = 'resize width -50'
down = 'resize height +50'
up = 'resize height -50'
right = 'resize width +50'
esc = 'mode main'
enter = 'mode main'
